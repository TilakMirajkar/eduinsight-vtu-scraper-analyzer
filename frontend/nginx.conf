server {
    listen 80;

    # ── React SPA ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Sends all routes to index.html so React Router works
        try_files $uri $uri/ /index.html;
    }

    # ── Django API ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;   # long timeout for scrape jobs
    }

    # ── Django admin ─────────────────────────────────────────
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # ── Django static files ──────────────────────────────────
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # ── Media files (Excel, charts) ──────────────────────────
    location /media/ {
        proxy_pass http://backend:8000;
    }
}